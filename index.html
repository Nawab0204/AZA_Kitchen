                    }, (error) => {
                        console.error(error.text);
                        setFormStatus('error');
                        setTimeout(() => setFormStatus('idle'), 5000);
                    });
            };

            return (
                <div className="pt-40 px-6 max-w-7xl mx-auto pb-24 animate-fade-in">
                    <div className="glass-card rounded-[50px] overflow-hidden grid lg:grid-cols-12 border-white/40 shadow-2xl">
                        <div className="lg:col-span-5 bg-neutral-900 p-12 md:p-20 text-white flex flex-col justify-between">
                            <div>
                                <h2 className="text-4xl md:text-7xl font-serif font-black mb-8 leading-none">Let's <span className="italic text-neutral-500">Connect.</span></h2>
                                <p className="text-neutral-400 text-xl font-medium italic mb-16 leading-relaxed">
                                    "We're based in Birmingham and serve clients across the Midlands. Reach out for a consultation."
                                </p>
                                
                                <div className="flex flex-col gap-10">
                                    <div className="flex items-start gap-6 group">
                                        <div className="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center text-white group-hover:bg-white group-hover:text-neutral-900 transition-all">
                                            <Icon name="MapPin" className="w-6 h-6" />
                                        </div>
                                        <div>
                                            <p className="text-xs uppercase tracking-widest font-black text-neutral-500 mb-1">Birmingham Studio</p>
                                            <p className="text-lg font-bold">Birmingham</p>
                                        </div>
                                    </div>
                                    
                                    <div className="flex items-start gap-6 group">
                                        <div className="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center text-white group-hover:bg-white group-hover:text-neutral-900 transition-all">
                                            <Icon name="Phone" className="w-6 h-6" />
                                        </div>
                                        <div>
                                            <p className="text-xs uppercase tracking-widest font-black text-neutral-500 mb-1">Direct Contact</p>
                                            <p className="text-lg font-bold">7727 370467</p>
                                        </div>
                                    </div>

                                    <div className="flex items-start gap-6 group">
                                        <div className="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center text-white group-hover:bg-white group-hover:text-neutral-900 transition-all">
                                            <Icon name="Mail" className="w-6 h-6" />
                                        </div>
                                        <div>
                                            <p className="text-xs uppercase tracking-widest font-black text-neutral-500 mb-1">Email</p>
                                            <p className="text-lg font-bold">Info@azakitchens.uk</p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                             <div className="mt-16 flex gap-6">
                                <a href="https://www.instagram.com/abuzaid_2222/reels/" target="_blank" rel="noreferrer" className="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center hover:bg-white hover:text-neutral-900 transition-all shadow-lg">
                                    <InstagramLogo className="w-6 h-6" />
                                </a>
                                <a href="#" className="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center hover:bg-white hover:text-neutral-900 transition-all shadow-lg">
                                    <FacebookLogo className="w-6 h-6" />
                                </a>
                            </div>
                        </div>

                        <div className="lg:col-span-7 p-12 md:p-24 bg-white/60 relative backdrop-blur-3xl">
                            <form ref={formRef} onSubmit={sendEmail} className="relative z-10 flex flex-col gap-10">
                                <div className="grid md:grid-cols-2 gap-10">
                                    <div className="flex flex-col gap-3">
                                        <label className="text-[10px] uppercase tracking-[0.2em] font-black text-neutral-400 px-1">Full Name</label>
                                        <input 
                                            type="text" 
                                            name="user_name"
                                            required
                                            placeholder="John Doe"
                                            className="bg-white border border-neutral-100 rounded-3xl p-6 focus:outline-none focus:ring-4 focus:ring-neutral-900/5 transition-all text-neutral-900 font-bold shadow-sm"
                                        />
                                    </div>
                                    <div className="flex flex-col gap-3">
                                        <label className="text-[10px] uppercase tracking-[0.2em] font-black text-neutral-400 px-1">Email</label>
                                        <input 
                                            type="email" 
                                            name="user_email"
                                            required
                                            placeholder="john@example.com"
                                            className="bg-white border border-neutral-100 rounded-3xl p-6 focus:outline-none focus:ring-4 focus:ring-neutral-900/5 transition-all text-neutral-900 font-bold shadow-sm"
                                        />
                                    </div>
                                </div>

                                <div className="flex flex-col gap-3">
                                    <label className="text-[10px] uppercase tracking-[0.2em] font-black text-neutral-400 px-1">Project Details</label>
                                    <textarea 
                                        name="message"
                                        rows={6}
                                        required
                                        placeholder="Tell us about your kitchen or bedroom wardrobe needs..."
                                        className="bg-white border border-neutral-100 rounded-3xl p-6 focus:outline-none focus:ring-4 focus:ring-neutral-900/5 transition-all text-neutral-900 font-bold resize-none shadow-sm"
                                    ></textarea>
                                </div>

                                <button 
                                    disabled={formStatus === 'sending'}
                                    className="bg-neutral-900 text-white rounded-[32px] p-8 font-black text-2xl shadow-2xl flex items-center justify-center gap-3 hover:bg-neutral-800 transition-all active:scale-95 disabled:opacity-50"
                                >
                                    {formStatus === 'idle' && <React.Fragment><Icon name="Send" className="w-8 h-8" /> Send Message</React.Fragment>}
                                    {formStatus === 'sending' && "Processing..."}
                                    {formStatus === 'success' && <React.Fragment><Icon name="CheckCircle2" className="w-8 h-8" /> Message Sent!</React.Fragment>}
                                    {formStatus === 'error' && "Error! Please retry."}
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        };

        // --- App Root ---

        const App = () => {
            const [activePage, setActivePage] = useState('home');

            useEffect(() => {
                window.scrollTo(0, 0);
            }, [activePage]);

            return (
                <div className="min-h-screen selection:bg-neutral-900 selection:text-white font-sans overflow-x-hidden">
                    <div className="mesh-bg" />
                    
                    <Navbar activePage={activePage} setActivePage={setActivePage} />

                    <main className="min-h-screen">
                        {activePage === 'home' && <Home setActivePage={setActivePage} />}
                        {activePage === 'about' && <About />}
                        {activePage === 'portfolio' && <Portfolio />}
                        {activePage === 'contact' && <Contact />}
                    </main>

                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
